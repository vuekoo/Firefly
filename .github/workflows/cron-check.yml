name: 友链每日巡检
on:
  schedule:
    - cron: "0 8 * * *"  # 北京时间 16:00
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm init -y && npm install playwright && npx playwright install chromium --with-deps
      - run: node .github/scripts/cron-check.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}