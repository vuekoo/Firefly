name: 🔍 友链每日巡检

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-friends:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 创建巡检脚本
        run: |
          cat > cron-check.cjs << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          async function checkFriend(url, retries = 3) {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();
            let lastError = null;

            for (let i = 0; i < retries; i++) {
              try {
                const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 12000 });
                const statusCode = response ? response.status() : null;
                if (response && response.ok()) {
                  await browser.close();
                  return { ok: true, status: statusCode, url: page.url() };
                }
                lastError = `HTTP ${statusCode}`;
              } catch (e) {
                lastError = e.message;
                if (i < retries - 1) {
                  await new Promise(r => setTimeout(r, 2000));
                }
              }
            }

            await browser.close();
            return { ok: false, error: lastError, url: url };
          }

          async function main() {
            // ====================== 我只改了这里：路径 ======================
            const friendsConfigPath = 'src/data/friends.ts'; // 🔥 已改为你现在的路径
            // ==============================================================
            const friendsConfigContent = fs.readFileSync(friendsConfigPath, 'utf-8');
            
            // 匹配 friendsData 而不是 friendsConfig
            const friendsConfigRegex = /export const friendsData: FriendItem\[\] = (\[(\s|\S)*?\]);/;
            const match = friendsConfigContent.match(friendsConfigRegex);
            if (!match) {
              console.error('❌ 读取友链配置失败：未找到 friendsData 数组');
              process.exit(1);
            }
            
            const raw = match[1]
              .replace(/\bid\s*:/g, '"id":')
              .replace(/\btitle\s*:/g, '"title":')
              .replace(/\bimgurl\s*:/g, '"imgurl":')
              .replace(/\bdesc\s*:/g, '"desc":')
              .replace(/\bsiteurl\s*:/g, '"siteurl":')
              .replace(/\btags\s*:/g, '"tags":')
              .replace(/,\s*(?=[\]}])/g, '');
            const friends = JSON.parse(raw);

            const results = [];

            for (const f of friends) {
              const skipNames = ['UpXuu'];
              if (skipNames.includes(f.title)) continue;

              const url = f.siteurl.replace(/\/$/, '');
              console.log(`检查: ${f.title} - ${url}`);

              const result = await checkFriend(url);

              const status = result.ok ? '✅' : '❌';
              console.log(`  结果: ${status} ${result.ok ? '' : result.error}`);
              results.push({
                name: f.title,
                url: url,
                ok: result.ok,
                error: result.error || null,
                issue_id: f.issue_id || null
              });

              await new Promise(r => setTimeout(r, 2000));
            }

            fs.writeFileSync('/tmp/cron_results.json', JSON.stringify(results, null, 2));

            const total = results.length;
            const ok = results.filter(r => r.ok).length;
            const fail = results.filter(r => !r.ok).length;
            console.log(`总计: ${total} | 正常: ${ok} | 不可达: ${fail}`);
          }

          main();
          EOF

      - name: 执行巡检
        id: check
        run: node cron-check.cjs

      - name: 处理异常并通知
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('/tmp/cron_results.json', 'utf-8'));

            const total = results.length;
            const ok = results.filter(r => r.ok).length;
            const fail = results.filter(r => !r.ok).length;

            const failed = results.filter(r => !r.ok);

            for (const f of failed) {
              if (f.issue_id) {
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: f.issue_id,
                    body: `⚠️ 友链异常检测\n\n你好，你的友链 **${f.name}** (${f.url}) 在每日巡检中无法访问。\n\n**错误信息**: ${f.error}\n\n请确认网站状态，回复本评论即可重新验证。`
                  });

                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: f.issue_id,
                    labels: ['needs-update']
                  });
                  console.log(`已通知 issue #${f.issue_id}`);
                } catch (e) {
                  console.log(`通知 issue #${f.issue_id} 失败: ${e.message}`);
                }
              }
            }

            let body = `## 🔍 友链每日巡检报告

            📊 **总览**
            - 检测总数：${total}
            - ✅ 正常：${ok}
            - ❌ 不可达：${fail}

            `;

            if (fail > 0) {
              body += `### ❌ 不可达的友链\n\n`;
              failed.forEach(r => {
                body += `- **${r.name}** - ${r.url}\n  - 原因: ${r.error}\n`;
                if (r.issue_id) {
                  body += `  - [查看 Issue #${r.issue_id}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${r.issue_id})\n`;
                }
              });
            } else {
              body += `🎉 所有友链状态正常！\n`;
            }

            body += `\n_检测时间: ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}_`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔍 友链巡检报告 ${new Date().toLocaleDateString('zh-CN')}`,
              body: body,
              labels: ['自动巡检']
            });
            console.log('巡检报告已发布');