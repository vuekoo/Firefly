name: 友链申请自动化

on:
  issues:
    types: [opened, reopened, edited]

jobs:
  validate-and-add-friend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        # 不指定 version，自动读取 package.json 中的版本
        with:
          run_install: false

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 Playwright 浏览器
        run: pnpm exec playwright install --with-deps chromium

      - name: 运行验证脚本
        id: validate
        env:
          ISSUE_ID: ${{ github.event.issue.number }}
        run: node .github/scripts/validate-friend.js

      - name: 配置 Git 用户
        if: steps.validate.outputs.status == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 提交并推送修改
        if: steps.validate.outputs.status == 'success'
        run: |
          git add src/config/friendsConfig.ts
          git commit -m "🤖 自动添加友链 #${{ github.event.issue.number }}"
          git push

      - name: 标记 Issue 为已完成
        if: steps.validate.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              labels: ['completed']
            })
            github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              name: 'pending'
            })
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: '✅ 友链验证通过！已自动添加到本站友链列表，Cloudflare 部署完成后即可生效。'
            })

      - name: 验证失败处理
        if: steps.validate.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              labels: ['needs-update']
            })
            github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              name: 'pending'
            })
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: '❌ 友链验证失败，请检查：\n1. 友链页面是否可正常访问\n2. 是否已正确添加本站友链信息\n修复后在本 Issue 下回复任意内容即可重新验证。'
            })