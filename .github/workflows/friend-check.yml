name: 友链每日巡检

on:
  schedule:
    - cron: '0 8 * * *' # 每天 UTC+8 16:00 执行
  workflow_dispatch: # 支持手动触发

jobs:
  check-friends:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行巡检脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/check-friends.js